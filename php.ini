memory_limit = 192M
max_execution_time = 120
upload_max_filesize = 20M
post_max_size = 20M

; OPcache — keep compiled bytecode in shared memory so PHP doesn't recompile
; every file on every request. validate_timestamps=0 is safe here because the
; code is immutable in the Docker image and recached on each deploy.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 64
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 15000
opcache.validate_timestamps = 0
opcache.save_comments = 1
