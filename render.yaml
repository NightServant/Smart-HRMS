services:
  - type: web
    name: smart-hrms
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /up
    envVars:
      # ── App ──────────────────────────────────────────────────────────────────
      - key: APP_NAME
        value: Smart HRMS
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false   # php artisan key:generate --show → paste here
      - key: APP_URL
        sync: false   # https://<your-service>.onrender.com

      # ── Proxy / Session ──────────────────────────────────────────────────────
      - key: TRUSTED_PROXIES
        value: "*"
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_LIFETIME
        value: "120"

      # ── Logging (stderr → visible in Render dashboard) ───────────────────────
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error

      # ── Database (TiDB Cloud Serverless — MySQL-compatible) ──────────────────
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false   # e.g. gateway01.ap-southeast-1.prod.aws.tidbcloud.com
      - key: DB_PORT
        value: "4000"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: MYSQL_ATTR_SSL_CA
        value: /etc/ssl/certs/ca-certificates.crt   # bundled in php:8.4-bookworm

      # ── Queue / Cache ────────────────────────────────────────────────────────
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: file

      # ── Mail (Resend API — works on Render free tier, no SMTP ports needed) ───
      - key: MAIL_MAILER
        value: resend
      - key: MAIL_FROM_ADDRESS
        value: onboarding@resend.dev
      - key: MAIL_FROM_NAME
        value: Smart HRMS
      - key: MAIL_CREDENTIALS_RECIPIENT
        sync: false   # egabecervantes@gmail.com — receives all credential emails
      - key: RESEND_API_KEY
        sync: false   # re_... from resend.com/api-keys

      # ── Zlink / Fingerprint ──────────────────────────────────────────────────
      - key: ZLINK_PORTAL_URL
        value: https://zlink.minervaiot.com
      - key: ZLINK_URL
        value: https://zlink-open.minervaiot.com
      - key: ZLINK_DEFAULT_DEPARTMENT_ID
        sync: false
      - key: ZLINK_DEFAULT_DEVICE_SN
        sync: false
      - key: ZLINK_DEFAULT_DESIGNATION_ID
        sync: false   # Portal "Job Title" UUID for Regular/Permanent — required for createEmployee
      - key: ZLINK_PORTAL_ROOT_DEPARTMENT_ID
        sync: false   # Portal company-root UUID — required as parentId for createDepartment
      - key: ZLINK_PORTAL_DEVICE_ID
        sync: false
      - key: ZLINK_PORTAL_COMPANY_ID
        sync: false
      - key: ZLINK_APP_KEY
        sync: false
      - key: ZLINK_APP_SECRET
        sync: false
      - key: ZLINK_SIGNATURE_TOKEN
        sync: false
      - key: ZLINK_ENCRYPTION_KEY
        sync: false
      - key: ZLINK_PORTAL_USERNAME
        sync: false
      - key: ZLINK_PORTAL_PASSWORD
        sync: false

      # ── Attendance ───────────────────────────────────────────────────────────
      - key: ATTENDANCE_SHIFT_START
        value: "08:00"
      - key: ATTENDANCE_GRACE_PERIOD_MINUTES
        value: "0"

      # ── Python AI modules ────────────────────────────────────────────────────
      - key: IWR_PYTHON_PATH
        value: /opt/venv/bin/python
      - key: PPE_PYTHON_PATH
        value: /opt/venv/bin/python
      - key: ATRE_PYTHON_PATH
        value: /opt/venv/bin/python
      - key: FLATFAT_PYTHON_PATH
        value: /opt/venv/bin/python

      # ── Vite ─────────────────────────────────────────────────────────────────
      - key: VITE_APP_NAME
        value: Smart HRMS

  # ── Queue cron — drains queued jobs (e.g. credential emails) every minute ──
  # Note: Render free plan does not support background workers; this cron runs
  # queue:work --stop-when-empty every minute as a free-tier alternative.
  - type: cron
    name: smart-hrms-queue
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    schedule: "* * * * *"
    startCommand: php artisan queue:work --stop-when-empty --tries=3 --backoff=5
    envVars:
      - key: APP_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "4000"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: MYSQL_ATTR_SSL_CA
        value: /etc/ssl/certs/ca-certificates.crt
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: database
      - key: MAIL_MAILER
        value: resend
      - key: MAIL_FROM_ADDRESS
        value: onboarding@resend.dev
      - key: MAIL_FROM_NAME
        value: Smart HRMS
      - key: MAIL_CREDENTIALS_RECIPIENT
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      # Zlink credentials — REQUIRED here, not just on the web service.
      # SyncEmployeeToZlinkJob short-circuits when ZLINK_APP_KEY is empty,
      # which is why newly created employees were saving to the DB but never
      # appearing in Zlink: the job ran but the worker had no credentials.
      - key: ZLINK_URL
        value: https://zlink-open.minervaiot.com
      - key: ZLINK_PORTAL_URL
        value: https://zlink.minervaiot.com
      - key: ZLINK_APP_KEY
        sync: false
      - key: ZLINK_APP_SECRET
        sync: false
      - key: ZLINK_SIGNATURE_TOKEN
        sync: false
      - key: ZLINK_ENCRYPTION_KEY
        sync: false
      - key: ZLINK_DEFAULT_DEPARTMENT_ID
        sync: false
      - key: ZLINK_DEFAULT_DEVICE_SN
        sync: false
      - key: ZLINK_DEFAULT_DESIGNATION_ID
        sync: false
      - key: ZLINK_PORTAL_ROOT_DEPARTMENT_ID
        sync: false
      - key: ZLINK_PORTAL_DEVICE_ID
        sync: false
      - key: ZLINK_PORTAL_COMPANY_ID
        sync: false
      - key: ZLINK_PORTAL_USERNAME
        sync: false
      - key: ZLINK_PORTAL_PASSWORD
        sync: false

  # ── Keep-alive cron — pings /ping every 10 min to prevent cold starts ────
  - type: cron
    name: smart-hrms-keepalive
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    schedule: "*/10 * * * *"
    envVars:
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
    startCommand: >-
      sh -c 'curl -fsS --retry 3 --max-time 10 "${APP_URL}/ping" && echo "keep-alive ok"'
